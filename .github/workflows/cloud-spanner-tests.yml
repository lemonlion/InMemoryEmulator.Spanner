name: Cloud Spanner Integration Tests

on:
  workflow_dispatch:
  schedule:
    # Sundays at 03:00 UTC
    - cron: '0 3 * * 0'

env:
  DOTNET_VERSION: '8.0.x'
  SHARD_COUNT: 4

jobs:
  test-cloud-spanner:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      SPANNER_TEST_TARGET: CloudSpanner
      GCP_PROJECT_ID: spanner-emulator-ci
      SPANNER_INSTANCE_ID: ci-test-instance
      SPANNER_DATABASE_ID: test-${{ github.run_id }}-${{ matrix.shard }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Cleanup stale databases from previous runs
        if: matrix.shard == 0
        run: |
          # Drop any leftover test-* databases to stay under the 5-database instance limit.
          # Only shard 0 runs this to avoid race conditions.
          DATABASES=$(gcloud spanner databases list \
            --instance="$SPANNER_INSTANCE_ID" \
            --project="$GCP_PROJECT_ID" \
            --format="value(name)" 2>/dev/null || true)
          for db in $DATABASES; do
            db_name=$(basename "$db")
            if [[ "$db_name" == test-* && "$db_name" != "test-${{ github.run_id }}-"* ]]; then
              echo "Dropping stale database: $db_name"
              gcloud spanner databases delete "$db_name" \
                --instance="$SPANNER_INSTANCE_ID" \
                --project="$GCP_PROJECT_ID" \
                --quiet || true
            fi
          done
          # Brief pause so other shards see the freed slots
          sleep 5

      - name: Wait for stale database cleanup
        if: matrix.shard != 0
        run: |
          # Give shard 0 time to clean up stale databases before we try to create ours
          sleep 15

      - name: Build
        run: dotnet build --configuration Release

      - name: Compute shard filter
        id: shard
        run: |
          # List all test classes, assign each to a shard by hash of class name.
          # This ensures stable distribution across runs.
          # Test names are: Namespace.ClassName.MethodName — extract ClassName
          CLASSES=$(dotnet test tests/Spanner.InMemoryEmulator.Tests.Integration/ \
            --configuration Release --no-build --list-tests 2>/dev/null \
            | grep -oP '^\s+\S+' | sed 's/^\s*//' \
            | awk -F. '{print $(NF-1)}' | sort -u)

          FILTER_PARTS=()
          while IFS= read -r class; do
            [ -z "$class" ] && continue
            # CRC32 hash via cksum, modulo shard count
            HASH=$(echo -n "$class" | cksum | awk '{print $1}')
            SHARD_ID=$((HASH % ${{ env.SHARD_COUNT }}))
            if [ "$SHARD_ID" -eq "${{ matrix.shard }}" ]; then
              FILTER_PARTS+=("FullyQualifiedName~${class}")
            fi
          done <<< "$CLASSES"

          # Join with | for OR filter
          FILTER=$(IFS='|'; echo "${FILTER_PARTS[*]}")
          # Combine with InMemoryOnly exclusion
          echo "filter=(${FILTER})&Target!=InMemoryOnly" >> "$GITHUB_OUTPUT"

      - name: Run integration tests (Cloud Spanner — shard ${{ matrix.shard }})
        run: |
          dotnet test tests/Spanner.InMemoryEmulator.Tests.Integration/ \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=cloud-spanner-shard-${{ matrix.shard }}.trx" \
            --filter "${{ steps.shard.outputs.filter }}"

      - name: Test summary
        if: always()
        run: |
          echo "## :test_tube: Cloud Spanner Shard ${{ matrix.shard }} Results" >> $GITHUB_STEP_SUMMARY
          for trx in $(find . -name '*.trx'); do
            file=$(basename "$trx" .trx)
            passed=$(grep -oP 'Counters[^>]*passed="\K[0-9]+' "$trx" | head -1)
            failed=$(grep -oP 'Counters[^>]*failed="\K[0-9]+' "$trx" | head -1)
            total=$(grep -oP 'Counters[^>]*total="\K[0-9]+' "$trx" | head -1)
            outcome=$(grep -oP 'ResultSummary outcome="\K[^"]+' "$trx" | head -1)
            icon=$( [ "$outcome" = "Completed" ] && echo ":white_check_mark:" || echo ":x:" )
            echo "| $icon **$file** | $passed passed | $failed failed | $total total |" >> $GITHUB_STEP_SUMMARY
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-cloud-shard-${{ matrix.shard }}
          path: '**/*.trx'

      - name: Cleanup — drop ephemeral database
        if: always()
        run: |
          gcloud spanner databases delete "$SPANNER_DATABASE_ID" \
            --instance="$SPANNER_INSTANCE_ID" \
            --project="$GCP_PROJECT_ID" \
            --quiet || true
